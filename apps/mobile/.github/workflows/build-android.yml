name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm install

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Generate native project
        run: npx expo prebuild --platform android --no-install

      - name: Fix Gradle wrapper version
        run: |
          sed -i 's/gradle-9\.0\.0-bin\.zip/gradle-8.13-bin.zip/g' android/gradle/wrapper/gradle-wrapper.properties

      - name: Setup signing (debug keystore)
        run: |
          keytool -genkey -v \
            -keystore android/app/release.keystore \
            -alias titan \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=Titan Protocol, O=Titan, L=Dev, ST=Dev, C=US"
          echo "TITAN_STORE_FILE=$(pwd)/android/app/release.keystore" >> android/gradle.properties
          echo "TITAN_STORE_PASSWORD=android" >> android/gradle.properties
          echo "TITAN_KEY_ALIAS=titan" >> android/gradle.properties
          echo "TITAN_KEY_PASSWORD=android" >> android/gradle.properties

          # Inject signingConfig into build.gradle
          cd android/app
          sed -i '/buildTypes {/i\    signingConfigs {\n        release {\n            storeFile file(TITAN_STORE_FILE)\n            storePassword TITAN_STORE_PASSWORD\n            keyAlias TITAN_KEY_ALIAS\n            keyPassword TITAN_KEY_PASSWORD\n        }\n    }' build.gradle
          sed -i 's/signingConfig signingConfigs.debug/signingConfig signingConfigs.release/g' build.gradle

      - name: Build Release APK
        run: cd android && ./gradlew assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: titan-protocol-v2-${{ github.run_number }}
          path: android/app/build/outputs/apk/release/*.apk
          if-no-files-found: error
