name: Android CI

# Triggers
#   - push to main: full pipeline (checks → APK build → artifact upload)
#   - PR to main: checks only (skip the slow APK build)
#   - workflow_dispatch: manual trigger from the Actions tab
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel any in-progress run on the same ref when a new commit lands.
# Saves CI minutes when you push twice in a row.
concurrency:
  group: android-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Job 1: TypeScript + Jest ──────────────────────────────────────────────
  # Fast preflight. Always runs (push + PR). Blocks the android job below.
  checks:
    name: Type-check & tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: TypeScript
        run: npx tsc --noEmit
        env:
          NODE_OPTIONS: --max-old-space-size=8192

      - name: Jest tests
        run: npm test

  # ─── Job 2: Build Android release APK ──────────────────────────────────────
  # Runs only on main pushes + manual dispatch (skipped on PRs to save minutes).
  # Depends on `checks` so a tsc/jest failure short-circuits the slow build.
  android:
    name: Build Android release APK
    runs-on: ubuntu-latest
    needs: checks
    if: github.event_name != 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('android/**/*.gradle*', 'android/**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      # Provision .env. Prefer secrets if set; fall back to .env.example
      # because the Supabase URL + anon key are publishable (RLS-gated) and
      # already committed there.
      - name: Provision .env
        env:
          SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
        run: |
          if [ -n "$SUPABASE_URL" ] && [ -n "$SUPABASE_ANON_KEY" ]; then
            {
              echo "EXPO_PUBLIC_SUPABASE_URL=${SUPABASE_URL}"
              echo "EXPO_PUBLIC_SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}"
            } > .env
            echo "✓ .env built from CI secrets"
          elif [ -f .env.example ]; then
            cp .env.example .env
            echo "✓ .env copied from .env.example (publishable values)"
          else
            echo "⚠ No .env.example and no secrets — build will likely fail at runtime"
          fi

      # Configure the release keystore. If the secret is set we use the real
      # keystore (signed builds suitable for Play Store). If not, we generate
      # an unreleasable debug keystore so the build still goes through and
      # the artifact is testable on dev devices.
      - name: Configure release signing
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 --decode > android/app/release.keystore
            {
              echo ""
              echo "TITAN_STORE_FILE=$(pwd)/android/app/release.keystore"
              echo "TITAN_STORE_PASSWORD=$KEYSTORE_PASSWORD"
              echo "TITAN_KEY_ALIAS=$KEY_ALIAS"
              echo "TITAN_KEY_PASSWORD=$KEY_PASSWORD"
            } >> android/gradle.properties
            echo "✓ Production signing configured"
          else
            echo "⚠ No ANDROID_KEYSTORE_BASE64 secret — generating debug keystore (UNRELEASABLE)"
            keytool -genkey -v \
              -keystore android/app/release.keystore \
              -alias titan \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -storepass android -keypass android \
              -dname "CN=Titan Protocol, O=Titan, L=Dev, ST=Dev, C=US"
            {
              echo ""
              echo "TITAN_STORE_FILE=$(pwd)/android/app/release.keystore"
              echo "TITAN_STORE_PASSWORD=android"
              echo "TITAN_KEY_ALIAS=titan"
              echo "TITAN_KEY_PASSWORD=android"
            } >> android/gradle.properties
          fi

      # Inject the signingConfigs block into android/app/build.gradle if it
      # isn't already there. Idempotent: re-running on a fresh checkout
      # always starts from the tracked version of the file.
      - name: Inject signing config into build.gradle
        run: |
          cd android/app
          if ! grep -q "TITAN_STORE_FILE" build.gradle; then
            sed -i '/buildTypes {/i\    signingConfigs {\n        release {\n            storeFile file(TITAN_STORE_FILE)\n            storePassword TITAN_STORE_PASSWORD\n            keyAlias TITAN_KEY_ALIAS\n            keyPassword TITAN_KEY_PASSWORD\n        }\n    }' build.gradle
            sed -i 's/signingConfig signingConfigs.debug/signingConfig signingConfigs.release/g' build.gradle
            echo "✓ Signing config injected"
          else
            echo "Signing config already present, skipping"
          fi

      - name: Build release APK
        run: cd android && ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Compute version tag
        id: version
        run: echo "tag=$(date +'%Y.%m.%d')-$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: titan-protocol-android-${{ steps.version.outputs.tag }}
          path: android/app/build/outputs/apk/release/*.apk
          if-no-files-found: error
          retention-days: 30
