name: Build Android APK (Mobile)

on:
  push:
    branches: [main]
    paths:
      - "apps/mobile/**"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/mobile

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/mobile/package-lock.json

      - run: npm install

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Generate native project
        run: npx expo prebuild --platform android --no-install

      - name: Setup signing
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 --decode > android/app/release.keystore
            echo "TITAN_STORE_FILE=$(pwd)/android/app/release.keystore" >> android/gradle.properties
            echo "TITAN_STORE_PASSWORD=$KEYSTORE_PASSWORD" >> android/gradle.properties
            echo "TITAN_KEY_ALIAS=$KEY_ALIAS" >> android/gradle.properties
            echo "TITAN_KEY_PASSWORD=$KEY_PASSWORD" >> android/gradle.properties
            echo "✓ Production signing configured"
          else
            echo "⚠ No secrets — generating debug keystore for release build"
            keytool -genkey -v \
              -keystore android/app/release.keystore \
              -alias titan \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -storepass android -keypass android \
              -dname "CN=Titan Protocol, O=Titan, L=Dev, ST=Dev, C=US"
            echo "TITAN_STORE_FILE=$(pwd)/android/app/release.keystore" >> android/gradle.properties
            echo "TITAN_STORE_PASSWORD=android" >> android/gradle.properties
            echo "TITAN_KEY_ALIAS=titan" >> android/gradle.properties
            echo "TITAN_KEY_PASSWORD=android" >> android/gradle.properties
          fi

          # Inject signingConfig into build.gradle
          cd android/app
          sed -i '/buildTypes {/i\    signingConfigs {\n        release {\n            storeFile file(TITAN_STORE_FILE)\n            storePassword TITAN_STORE_PASSWORD\n            keyAlias TITAN_KEY_ALIAS\n            keyPassword TITAN_KEY_PASSWORD\n        }\n    }' build.gradle
          sed -i 's/signingConfig signingConfigs.debug/signingConfig signingConfigs.release/g' build.gradle

      - name: Build Release APK
        run: cd android && ./gradlew assembleRelease

      - name: Set version string
        id: version
        run: echo "tag=$(date +'%Y.%m.%d')-$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: titan-protocol-android-${{ steps.version.outputs.tag }}
          path: apps/mobile/android/app/build/outputs/apk/release/*.apk
          if-no-files-found: error
