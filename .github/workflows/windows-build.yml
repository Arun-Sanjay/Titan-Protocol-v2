name: Windows Tauri Build

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Setup Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            apps/web/src-tauri -> target

      - name: Install web dependencies
        working-directory: apps/web
        run: npm ci

      - name: Install NSIS
        run: choco install nsis -y

      - name: Generate Tauri icons (includes .ico for Windows)
        working-directory: apps/web
        run: npx tauri icon src-tauri/icons/icon.png

      - name: Verify Windows icon exists
        shell: pwsh
        run: |
          if (!(Test-Path "apps/web/src-tauri/icons/icon.ico")) {
            Write-Error "icon.ico was not generated."
            exit 1
          }
          Write-Host "Found icon.ico"

      - name: Build Tauri app (Windows)
        working-directory: apps/web
        env:
          TAURI: "1"
        run: npx tauri build --bundles nsis

      - name: List Windows bundle output
        shell: pwsh
        run: |
          if (Test-Path "apps/web/src-tauri/target/release/bundle/nsis") {
            Get-ChildItem -Path "apps/web/src-tauri/target/release/bundle/nsis" -Recurse -File | ForEach-Object { $_.FullName }
          } else {
            Write-Host "NSIS bundle directory not found."
          }

      - name: Upload Windows installer artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tauri-windows-nsis
          path: |
            apps/web/src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error