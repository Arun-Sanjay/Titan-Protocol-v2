name: Shared CI

# Triggers
#   - push to main: typecheck
#   - PRs to main: typecheck
#   - workflow_dispatch: manual run
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: shared-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: Type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: TypeScript
        run: npx tsc --noEmit
        env:
          NODE_OPTIONS: --max-old-space-size=8192
